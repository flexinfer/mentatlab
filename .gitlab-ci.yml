# MentatLab CI/CD Pipeline
# Uses BuildKit via the central buildkitd service with pre-configured Harbor credentials

include:
  - project: platform/gitops
    ref: main
    file:
      - /k3s/ci/caches/gitlab-ci-cache.yml

stages:
  - lint
  - test
  - build
  - e2e
  - deploy

variables:
  REGISTRY: registry.harbor.lan/library
  HARBOR_DOCKERHUB_MIRROR: registry.harbor.lan/dockerhub-cache
  GO_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/library/golang:${GO_VERSION}-alpine
  NODE_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/library/node:${NODE_VERSION}-alpine
  PYTHON_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/library/python:3.12-alpine
  DOCKER_CLI_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/library/docker:24-cli
  DOCKER_DIND_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/library/docker:24-dind
  KUBECTL_CI_IMAGE: ${HARBOR_DOCKERHUB_MIRROR}/alpine/k8s:1.31.0
  BUILDKIT_HOST: "tcp://buildkitd-central.ci-build.svc.cluster.local:1234"
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  # Work around GitLab advertising an in-cluster clone URL to runners outside the cluster
  GIT_STRATEGY: none
  GITLAB_EXTERNAL_HOST: gitlab.flexinfer.ai

# ==============================================================================
# Reusable Scripts
# ==============================================================================

.apk_add_git: &apk_add_git
  - |
    set -euo pipefail
    if command -v git >/dev/null 2>&1; then
      exit 0
    fi
    if [ ! -s /etc/ssl/certs/ca-certificates.crt ]; then
      echo "Installing CA certificates..."
      sed -i 's#^https:#http:#' /etc/apk/repositories 2>/dev/null || true
      apk add --no-cache ca-certificates || true
      update-ca-certificates || true
      sed -i 's#^http:#https:#' /etc/apk/repositories 2>/dev/null || true
    fi
    for i in 1 2 3; do
      if apk add --no-cache git; then
        exit 0
      fi
      echo "apk add git failed (attempt $i/3); retrying..."
      sleep $((i * 3))
    done
    echo "Falling back to alternate Alpine mirror over HTTP..."
    sed -i 's#https://dl-cdn.alpinelinux.org#http://mirrors.edge.kernel.org#' /etc/apk/repositories
    apk add --no-cache git

.clone_repo: &clone_repo
  - |
    set -euo pipefail
    if [ -d ".git" ] && git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
      echo "Repository already present"
      exit 0
    fi
    echo "Cloning via external host ${GITLAB_EXTERNAL_HOST}..."
    git init -q .
    git remote remove origin >/dev/null 2>&1 || true
    git remote add origin "https://gitlab-ci-token:${CI_JOB_TOKEN}@${GITLAB_EXTERNAL_HOST}/${CI_PROJECT_PATH}.git"
    for i in 1 2 3 4 5; do
      if git fetch -q --depth "${GIT_DEPTH:-20}" origin "${CI_COMMIT_SHA}"; then
        break
      fi
      if [ "$i" -eq 5 ]; then
        echo "ERROR: git fetch failed after ${i} attempts"
        exit 1
      fi
      echo "git fetch failed (attempt ${i}/5); retrying..."
      sleep $((i * 2))
    done
    git checkout -q -f "${CI_COMMIT_SHA}"

.npm_ci_verify: &npm_ci_verify
  - |
    set -euo pipefail
    npm ci --prefer-offline || true
    if [ ! -x node_modules/.bin/tsc ]; then
      echo "npm install incomplete after first attempt; retrying clean npm ci..."
      rm -rf node_modules
      npm cache clean --force || true
      npm ci
    fi
    test -x node_modules/.bin/tsc

# Cache settings
.go-cache: &go-cache
  cache:
    key: go-${CI_COMMIT_REF_SLUG}
    paths:
      - .go/pkg/mod/
    policy: pull-push
    when: on_success

.node-cache: &node-cache
  cache:
    key: node-${CI_COMMIT_REF_SLUG}
    paths:
      - services/frontend/node_modules/
    policy: pull-push
    when: on_success

# ==============================================================================
# LINT STAGE
# ==============================================================================

lint-go:
  stage: lint
  image: $GO_CI_IMAGE
  <<: *go-cache
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - (cd services/gateway-go && go mod download && go vet ./...)
    - (cd services/orchestrator-go && go mod download && go vet ./...)
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint-frontend:
  stage: lint
  image: $NODE_CI_IMAGE
  <<: *node-cache
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - cd services/frontend
    - *npm_ci_verify
    - npm run lint
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ==============================================================================
# TEST STAGE
# ==============================================================================

test-go:
  stage: test
  image: $GO_CI_IMAGE
  <<: *go-cache
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - (cd services/gateway-go && go mod download && go test -v -coverprofile=cover.out ./... && go tool cover -func=cover.out)
    - (cd services/orchestrator-go && go mod download && go test -v -coverprofile=cover.out ./... && go tool cover -func=cover.out)
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-frontend:
  stage: test
  image: $NODE_CI_IMAGE
  <<: *node-cache
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - cd services/frontend
    - *npm_ci_verify
    - npm test -- --coverage
  coverage: '/All files\s*\|\s*(\d+\.\d+)/'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-integration-smoke-go:
  stage: test
  image: $GO_CI_IMAGE
  <<: *go-cache
  variables:
    GOPATH: $CI_PROJECT_DIR/.go
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - >
      (cd services/orchestrator-go &&
      go mod download &&
      go test -v -count=1 ./internal/api -run 'TestRunFlowPreservesMCPPayloadInCreatedRunPlan|TestRunFlowPreservesFlexInferPayloadInCreatedRunPlan')
    - >
      (cd services/orchestrator-go &&
      go test -v -count=1 ./internal/scheduler -run 'TestLoomRunSessionManagerLifecycleCalls')
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-integration-smoke-agent:
  stage: test
  image: $PYTHON_CI_IMAGE
  before_script:
    - *apk_add_git
    - *clone_repo
  script:
    - python3 -m pip install --no-cache-dir pytest
    - python3 -m pytest -q agents/loom-mcp-executor/test_main.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ==============================================================================
# BUILD STAGE
# ==============================================================================

.build-template: &build-template
  stage: build
  image: registry.harbor.lan/library/ci-builder:latest
  timeout: 2h
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
  variables:
    BUILDKIT_STEP_LOG_MAX_SIZE: "50000000"
    BUILDKIT_ATTEMPT_TIMEOUT: "15m"
  before_script:
    - *clone_repo
    - |
      echo "Waiting for BuildKit..."
      for i in $(seq 1 30); do
        if buildctl --addr "${BUILDKIT_HOST}" debug info >/dev/null 2>&1; then
          echo "BuildKit is ready"; break
        fi
        echo "[$i/30] not ready yet"; sleep 2
      done
      buildctl --addr "${BUILDKIT_HOST}" debug info
    - |
      # Shared build_image function with zstd compression and retry-with-fallback
      CACHE_REPO="registry.harbor.lan/library/build-cache"

      run_buildctl() {
        if command -v timeout >/dev/null 2>&1; then
          timeout "${BUILDKIT_ATTEMPT_TIMEOUT}" buildctl --addr "${BUILDKIT_HOST}" build "$@"
        else
          echo "WARNING: timeout command not available in ci-builder image; running buildctl without per-attempt timeout"
          buildctl --addr "${BUILDKIT_HOST}" build "$@"
        fi
      }

      build_image() {
        local name="$1" context="$2"
        echo "=== Building ${name} from ${context} ==="

        local output="type=image,push=true,compression=zstd,compression-level=3"
        output="${output},name=${REGISTRY}/${name}:${CI_COMMIT_SHORT_SHA}"
        if [ "$CI_COMMIT_BRANCH" = "main" ]; then
          output="${output},name=${REGISTRY}/${name}:latest"
        fi

        # First attempt: build with cache
        if run_buildctl \
          --frontend dockerfile.v0 \
          --local "context=${context}" \
          --local "dockerfile=${context}" \
          --opt platform=linux/amd64 \
          --opt "build-arg:GOPROXY=${GOPROXY:-}" \
          --opt "build-arg:npm_config_registry=${npm_config_registry:-}" \
          --opt "build-arg:NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-}" \
          --opt "build-arg:PIP_INDEX_URL=${PIP_INDEX_URL:-}" \
          --opt "build-arg:PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-}" \
          --export-cache "type=registry,ref=${CACHE_REPO}:${name},mode=max,image-manifest=true" \
          --import-cache "type=registry,ref=${CACHE_REPO}:${name}" \
          --output "${output}"; then
          echo "=== ${name} built successfully ==="
          return 0
        fi

        # Second attempt: retry without import-cache (handles cold/corrupt cache)
        echo "WARNING: ${name} build failed with cache, retrying without cache..."
        run_buildctl \
          --frontend dockerfile.v0 \
          --local "context=${context}" \
          --local "dockerfile=${context}" \
          --opt platform=linux/amd64 \
          --opt "build-arg:GOPROXY=${GOPROXY:-}" \
          --opt "build-arg:npm_config_registry=${npm_config_registry:-}" \
          --opt "build-arg:NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-}" \
          --opt "build-arg:PIP_INDEX_URL=${PIP_INDEX_URL:-}" \
          --opt "build-arg:PIP_TRUSTED_HOST=${PIP_TRUSTED_HOST:-}" \
          --export-cache "type=registry,ref=${CACHE_REPO}:${name},mode=max,image-manifest=true" \
          --output "${output}"
        echo "=== ${name} built successfully (no-cache retry) ==="
      }
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build-go:
  <<: *build-template
  script:
    - build_image "mentatlab-orchestrator-go" "services/orchestrator-go"
    - build_image "mentatlab-gateway-go" "services/gateway-go"

build-frontend:
  <<: *build-template
  script:
    - build_image "mentatlab-frontend" "services/frontend"

build-agents:
  <<: *build-template
  script:
    - build_image "mentatlab-echoagent" "services/agents/echo"
    - build_image "mentatlab-psyche-sim" "agents/psyche-sim"
    - build_image "mentatlab-ctm-cogpack" "agents/ctm-cogpack"

# ==============================================================================
# E2E TEST STAGE
# ==============================================================================

e2e-test:
  stage: e2e
  needs: [build-go, build-frontend, build-agents]
  image: $DOCKER_CLI_CI_IMAGE
  services:
    - name: $DOCKER_DIND_CI_IMAGE
      alias: docker
      command: ["--tls=false", "--insecure-registry=registry.harbor.lan"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    # Use :latest on main (BuildKit multi-name push may not reliably push SHA tag)
    ORCHESTRATOR_IMAGE: "${REGISTRY}/mentatlab-orchestrator-go:latest"
    GATEWAY_IMAGE: "${REGISTRY}/mentatlab-gateway-go:latest"
    FRONTEND_IMAGE: "${REGISTRY}/mentatlab-frontend:latest"
  before_script:
    - apk add --no-cache curl jq git
    - *clone_repo
    - |
      echo "Waiting for Docker daemon..."
      for i in $(seq 1 30); do
        if docker info >/dev/null 2>&1; then
          echo "Docker daemon ready"
          break
        fi
        echo "[$i/30] Docker not ready yet..."
        sleep 2
      done
    - docker info
    # Authenticate DinD with Harbor
    # Requires HARBOR_USER and HARBOR_PASSWORD CI/CD variables (Settings > CI/CD > Variables)
    - |
      if [ -n "${HARBOR_USER:-}" ] && [ -n "${HARBOR_PASSWORD:-}" ]; then
        echo "Logging into Harbor with CI/CD credentials..."
        echo "${HARBOR_PASSWORD}" | docker login registry.harbor.lan -u "${HARBOR_USER}" --password-stdin
      else
        echo "WARNING: HARBOR_USER/HARBOR_PASSWORD not set — docker pull may fail"
        echo "Set these as CI/CD variables: Settings > CI/CD > Variables"
      fi
  script:
    - |
      echo "=== Starting E2E Tests ==="

      # Create compose override for CI (uses pre-built images instead of building)
      cat > docker-compose.ci.yml <<CIEOF
      services:
        orchestrator:
          image: ${ORCHESTRATOR_IMAGE}
          build: !reset null
        gateway:
          image: ${GATEWAY_IMAGE}
          build: !reset null
        frontend:
          image: ${FRONTEND_IMAGE}
          build: !reset null
      CIEOF

      # Pull images explicitly (better error messages than compose)
      echo "Pulling images..."
      docker pull "${ORCHESTRATOR_IMAGE}"
      docker pull "${GATEWAY_IMAGE}"
      docker pull "${FRONTEND_IMAGE}"

      # Start services using docker compose v2 (supports !reset null)
      echo "Starting services..."
      docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d

      # Wait for services to be healthy
      echo "Waiting for services to be healthy..."
      MAX_RETRIES=60
      for i in $(seq 1 $MAX_RETRIES); do
        ORCH_HEALTH=$(curl -sf http://localhost:7070/healthz 2>/dev/null && echo "ok" || echo "fail")
        GW_HEALTH=$(curl -sf http://localhost:8080/healthz 2>/dev/null && echo "ok" || echo "fail")
        FE_HEALTH=$(curl -sf http://localhost:5173 2>/dev/null && echo "ok" || echo "fail")

        if [ "$ORCH_HEALTH" = "ok" ] && [ "$GW_HEALTH" = "ok" ] && [ "$FE_HEALTH" = "ok" ]; then
          echo "All services healthy!"
          break
        fi

        echo "[$i/$MAX_RETRIES] Waiting... (orch=$ORCH_HEALTH, gw=$GW_HEALTH, fe=$FE_HEALTH)"
        sleep 2
      done

      # Run E2E tests
      echo "=== Running E2E Tests ==="

      # Test 1: Health endpoints
      echo "Test 1: Health endpoints..."
      curl -sf http://localhost:7070/healthz || (echo "FAIL: Orchestrator health" && exit 1)
      curl -sf http://localhost:8080/healthz || (echo "FAIL: Gateway health" && exit 1)
      echo "PASS: Health endpoints"

      # Test 2: API endpoints are reachable
      echo "Test 2: API endpoints..."
      curl -sf http://localhost:7070/api/v1/runs || (echo "FAIL: Runs endpoint" && exit 1)
      curl -sf http://localhost:7070/api/v1/agents || (echo "FAIL: Agents endpoint" && exit 1)
      echo "PASS: API endpoints"

      # Test 3: Gateway proxies to orchestrator
      echo "Test 3: Gateway proxy..."
      curl -sf http://localhost:8080/api/v1/runs || (echo "FAIL: Gateway proxy" && exit 1)
      echo "PASS: Gateway proxy"

      # Test 4: Frontend loads
      echo "Test 4: Frontend..."
      curl -sf http://localhost:5173 | grep -qi "<!DOCTYPE html>" || (echo "FAIL: Frontend" && exit 1)
      echo "PASS: Frontend"

      echo "=== All E2E Tests Passed ==="
  after_script:
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml logs --tail=100 || true
    - docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v || true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ==============================================================================
# DEPLOY STAGE
# ==============================================================================

deploy:
  stage: deploy
  image: $KUBECTL_CI_IMAGE
  needs: [build-go, build-frontend, build-agents, e2e-test]
  variables:
    NAMESPACE: mentatlab
  before_script:
    - apk add --no-cache git
    - *clone_repo
    - |
      if [ -n "${KUBECONFIG_K3S:-}" ]; then
        mkdir -p ~/.kube
        printf '%s' "${KUBECONFIG_K3S}" > ~/.kube/config
        chmod 600 ~/.kube/config
        kubectl version --client
        kubectl cluster-info
      else
        echo "KUBECONFIG_K3S is not set; direct kubectl deploy will be skipped (Flux GitOps remains active)."
      fi
  script:
    - |
      if [ -z "${KUBECONFIG_K3S:-}" ]; then
        echo "Skipping direct kubectl deployment because KUBECONFIG_K3S is unset."
        exit 0
      fi

      echo "=== Deploying MentatLab to ${NAMESPACE} ==="
      cd k8s

      # Use :latest tag — BuildKit multi-name push does not reliably push
      # SHA-tagged manifests (see issue #50). Commit SHA is recorded via
      # kubectl annotation for traceability instead.
      IMAGE_TAG="latest"
      echo "Setting image tags to ${IMAGE_TAG}..."
      kustomize edit set image \
        "registry.harbor.lan/library/mentatlab-orchestrator-go=${REGISTRY}/mentatlab-orchestrator-go:${IMAGE_TAG}" \
        "registry.harbor.lan/library/mentatlab-gateway-go=${REGISTRY}/mentatlab-gateway-go:${IMAGE_TAG}" \
        "registry.harbor.lan/library/mentatlab-frontend=${REGISTRY}/mentatlab-frontend:${IMAGE_TAG}" \
        "registry.harbor.lan/library/mentatlab-echoagent=${REGISTRY}/mentatlab-echoagent:${IMAGE_TAG}"

      # Apply manifests using server-side apply
      echo "Applying manifests..."
      kustomize build . | kubectl apply --server-side --force-conflicts -f -

      # Annotate deployments with the source commit for traceability
      for dep in orchestrator gateway frontend; do
        kubectl annotate deployment/${dep} -n ${NAMESPACE} \
          "mentatlab.io/deployed-commit=${CI_COMMIT_SHORT_SHA}" \
          "mentatlab.io/deployed-at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          --overwrite || true
      done

      # Wait for rollouts
      echo "Waiting for deployments to roll out..."
      kubectl rollout status deployment/orchestrator -n ${NAMESPACE} --timeout=3m
      kubectl rollout status deployment/gateway -n ${NAMESPACE} --timeout=3m
      kubectl rollout status deployment/frontend -n ${NAMESPACE} --timeout=3m

      echo "=== Deployment complete ==="
      kubectl get pods -n ${NAMESPACE}
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
