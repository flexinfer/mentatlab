apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mentatlab
  labels:
    app: frontend
    component: ui
spec:
  ports:
    - port: 5173
      targetPort: 5173
      name: http
  selector:
    app: frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mentatlab
  labels:
    app: frontend
    component: ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: frontend
          image: registry.harbor.lan/library/mentatlab-frontend:v0.0.0-placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 5173
              name: http
          env:
            - name: PORT
              value: "5173"
            # Browser-accessible gateway URL — uses the ingress hostname so
            # API calls to /api/* and WebSocket at /ws/* resolve correctly.
            - name: VITE_GATEWAY_BASE_URL
              value: "https://mentatlab.flexinfer.ai"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
