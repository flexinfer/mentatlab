apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mentatlab

resources:
  - namespace.yaml
  - orchestrator-rbac.yaml
  - configmap-urls.yaml
  - redis.yaml
  - minio-secret.yaml
  - minio.yaml
  - orchestrator.yaml
  - gateway.yaml
  - frontend.yaml
  - echoagent.yaml
  - ingress.yaml
  - network-policies.yaml
  - hpa.yaml
  - servicemonitor.yaml
  - grafana-dashboards.yaml

# Image tags — CI overrides via `kustomize edit set image`.
# Pin to a dev tag; CI replaces with build-specific tags.
images:
  - name: registry.harbor.lan/library/mentatlab-orchestrator-go
    newTag: latest
  - name: registry.harbor.lan/library/mentatlab-gateway-go
    newTag: latest
  - name: registry.harbor.lan/library/mentatlab-frontend
    newTag: latest
  - name: registry.harbor.lan/library/mentatlab-echoagent
    newTag: latest

# Common labels for all resources (use 'labels' not 'commonLabels' to avoid modifying immutable selectors)
labels:
  - pairs:
      app.kubernetes.io/part-of: mentatlab
      app.kubernetes.io/managed-by: flux
    includeSelectors: false
