apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mentatlab

resources:
  - namespace.yaml
  - orchestrator-rbac.yaml
  - redis.yaml
  - minio.yaml
  - orchestrator.yaml
  - gateway.yaml
  - frontend.yaml
  - echoagent.yaml
  - ingress.yaml
  - network-policies.yaml
  - hpa.yaml
  - servicemonitor.yaml
  - grafana-dashboards.yaml

# Placeholder image tags — CI overrides via `kustomize edit set image` to pin
# to CI_COMMIT_SHORT_SHA. Never apply these placeholders directly.
images:
  - name: registry.harbor.lan/library/mentatlab-orchestrator-go
    newTag: v0.0.0-placeholder
  - name: registry.harbor.lan/library/mentatlab-gateway-go
    newTag: v0.0.0-placeholder
  - name: registry.harbor.lan/library/mentatlab-frontend
    newTag: v0.0.0-placeholder
  - name: registry.harbor.lan/library/mentatlab-echoagent
    newTag: v0.0.0-placeholder

# Common labels for all resources (use 'labels' not 'commonLabels' to avoid modifying immutable selectors)
labels:
  - pairs:
      app.kubernetes.io/part-of: mentatlab
      app.kubernetes.io/managed-by: flux
    includeSelectors: false
