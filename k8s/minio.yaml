apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: mentatlab
  labels:
    app: minio
    component: storage
spec:
  ports:
    - port: 9000
      targetPort: 9000
      name: api
    - port: 9001
      targetPort: 9001
      name: console
  selector:
    app: minio
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data
  namespace: mentatlab
  labels:
    app: minio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-data-v2
  namespace: mentatlab
  labels:
    app: minio
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: mentatlab
  labels:
    app: minio
    component: storage
spec:
  replicas: 1
  # Single-replica + RWO PVC: use Recreate to avoid Multi-Attach races during
  # rollouts and restarts.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
        component: storage
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: minio
          image: registry.harbor.lan/dockerhub-cache/minio/minio:RELEASE.2024-01-18T22-51-28Z
          args:
            - server
            - /data
            - --console-address
            - ":9001"
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
              ephemeral-storage: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
              ephemeral-storage: 4Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            # Non-destructive cutover: keep minio-data for forensics.
            claimName: minio-data-v2
---
# Create the default bucket on startup
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: mentatlab
  labels:
    app: minio
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 900
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: registry.harbor.lan/dockerhub-cache/minio/mc:RELEASE.2024-01-18T07-03-39Z
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              ready=0
              for i in $(seq 1 60); do
                if mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; then
                  ready=1
                  break
                fi
                echo "minio-create-bucket: waiting for MinIO (attempt $i/60)"
                sleep 5
              done
              if [ "$ready" -ne 1 ]; then
                echo "minio-create-bucket: MinIO never became ready" >&2
                exit 1
              fi
              mc mb --ignore-existing local/mentatlab-artifacts
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_ACCESS_KEY
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: MINIO_SECRET_KEY
