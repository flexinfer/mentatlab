# Echo agent image reference for Kustomize tag management.
# The echo agent is a stdin/stdout batch process, not an HTTP service.
# It runs as ephemeral K8s Jobs created by the orchestrator scheduler
# (ORCH_DRIVER=k8s), not as a long-running Deployment.
# Replicas set to 0 — this Deployment exists only for image tag tracking.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: echoagent
  namespace: mentatlab
  labels:
    app: echoagent
    component: agent
    mentatlab.io/component: agent
spec:
  replicas: 0
  selector:
    matchLabels:
      app: echoagent
  template:
    metadata:
      labels:
        app: echoagent
        component: agent
        mentatlab.io/component: agent
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: echoagent
          image: registry.harbor.lan/library/mentatlab-echoagent:v0.0.0-placeholder
          imagePullPolicy: Always
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
