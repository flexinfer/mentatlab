# MinIO credentials — encrypt with SOPS before committing to production.
# For local/dev: apply as-is.  For production: sops -e -i minio-secret.yaml
apiVersion: v1
kind: Secret
metadata:
  name: minio-credentials
  namespace: mentatlab
  labels:
    app: minio
    component: storage
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "mentatlab-admin"
  MINIO_SECRET_KEY: "CHANGE_ME_BEFORE_DEPLOY"
