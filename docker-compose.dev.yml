services:
  gateway:
    build:
      context: services/gateway-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ORCHESTRATOR_BASE_URL=http://orchestrator:7070
      - PORT=8080
    depends_on:
      - orchestrator
    networks:
      - mentat-network

  orchestrator:
    build:
      context: services/orchestrator-go
      dockerfile: Dockerfile
    ports:
      - "7070:7070"
    environment:
      - ORCH_RUNSTORE=${ORCH_RUNSTORE:-memory}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
    networks:
      - mentat-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mentat-network

  frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_GATEWAY_URL=http://localhost:8080
      - VITE_GATEWAY_BASE_URL=http://localhost:8080
      - VITE_ORCHESTRATOR_URL=http://localhost:7070
      - VITE_API_URL=http://localhost:7070
      - VITE_WS_URL=ws://localhost:8080
      - VITE_CONNECT_WS=true
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - mentat-network

  echo-agent:
    build:
      context: ./services/agents/echo
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
    networks:
      - mentat-network

networks:
  mentat-network:
    driver: bridge
