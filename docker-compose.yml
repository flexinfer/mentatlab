services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 3s
      retries: 5

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "3200:3200"   # Tempo HTTP API
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3200/ready || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      tempo:
        condition: service_healthy

  orchestrator:
    build:
      context: services/orchestrator-go
      dockerfile: Dockerfile
    environment:
      - ORCH_RUNSTORE=${ORCH_RUNSTORE:-memory}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=tempo:4317
    depends_on:
      redis:
        condition: service_healthy
      tempo:
        condition: service_healthy
    ports:
      - "7070:7070"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:7070/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: services/gateway-go
      dockerfile: Dockerfile
    environment:
      - ORCHESTRATOR_BASE_URL=http://orchestrator:7070
      - PORT=8080
      - TRACING_ENABLED=true
      - OTLP_ENDPOINT=tempo:4317
      - TEMPO_QUERY_URL=http://tempo:3200
    depends_on:
      orchestrator:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: services/frontend
      dockerfile: Dockerfile
      args:
        # Embed URLs into the built frontend so preview can reach services
        VITE_GATEWAY_BASE_URL: ${VITE_GATEWAY_BASE_URL:-http://localhost:8080}
        VITE_ORCHESTRATOR_URL: ${VITE_ORCHESTRATOR_URL:-http://localhost:7070}
    environment:
      - VITE_GATEWAY_BASE_URL=http://localhost:8080
      - VITE_ORCHESTRATOR_URL=http://localhost:7070
      - VITE_PROXY_TARGET=http://orchestrator:7070
      - PORT=5173
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "5173:5173"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5173 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  tempo-data:
  grafana-data:
